name: DOTNET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:  
  
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: Backend
    
    steps:
      - uses: actions/checkout@v4
  
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal
        
  docker:
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        working-directory: Backend

    steps:
      - uses: actions/checkout@v4

      - name: Check Docker
        run: docker --version

      - name: Up
        run: make up

      - name: Wait for services
        run: sleep 10

      - name: Down
        run: make down

      - name: Down and clean
        run: make down-and-clean
